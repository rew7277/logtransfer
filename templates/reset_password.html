<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Reset password | ObserveX</title><link rel='stylesheet' href='{{ url_for("static", filename="styles.css") }}'></head><body class='login-body theme-white auth-page-body'><main class='auth-page-shell'><section class='auth-page-copy glass-panel'><div class='eyebrow'>Reset password</div><h1>Choose a new password.</h1><p class='hero-lead compact-lead'>After resetting, go back to sign in and enter the new password.</p></section><section class='login-panel auth-page-form-panel'><div class='eyebrow'>Reset password</div><h2 class='auth-form-title'>New password</h2><form class='login-form' id='resetForm'><div><label>New password</label><input type='password' name='password' placeholder='Create a new password' required /></div><button class='primary-btn wide' type='submit'>Save password</button></form><div class='result-box' id='resetResult'>Use a strong password for your workspace account.</div><div class='auth-page-links'><a href='/login'>Back to sign in</a></div></section></main><script>document.getElementById('resetForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload=Object.fromEntries(new FormData(e.target).entries());payload.token='{{ token }}';const box=document.getElementById('resetResult');box.textContent='Resetting password...';const r=await fetch('/api/password/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();box.textContent=d.message||d.error||'Done';if(r.ok){setTimeout(()=>location.href='/login',1200);}});</script></body></html>
