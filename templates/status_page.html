<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>{{ title }} – ObserveX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1f2328;text-align:center;padding:40px}.card{max-width:420px;background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:36px}h1{font-size:20px;font-weight:700;margin-bottom:10px}p{font-size:14px;color:#57606a;margin-bottom:20px}.btn{display:inline-block;padding:9px 22px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}</style></head>
<body><div class="card"><h1>{{ title }}</h1><p>{{ message }}</p><a href="{{ action_href }}" class="btn">{{ action_label }}</a></div></body></html>
