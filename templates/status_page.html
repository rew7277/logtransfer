<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
<meta name="theme-color" content="#080c14">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{ title }} — ObserveX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#080c14;color:#f0f4ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
.logo-wrap{margin-bottom:40px}
.logo-wrap img{height:32px;width:auto;display:block}
.card{max-width:460px;width:100%;background:rgba(13,20,32,.9);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;text-align:center;backdrop-filter:blur(16px);box-shadow:0 32px 80px rgba(0,0,0,.5)}
.icon{font-size:48px;margin-bottom:20px;display:block}
h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
p{font-size:14px;color:#8898b3;line-height:1.75;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;background:#3b82f6;color:#fff;border-radius:9px;text-decoration:none;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;transition:all .2s}
.btn:hover{background:#2563eb;transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
.back-link{display:block;margin-top:20px;font-size:12px;color:#5a6e8a;text-decoration:none;font-family:'IBM Plex Mono',monospace}
.back-link:hover{color:#8898b3}
</style>
</head>
<body>
<div class="logo-wrap">
  <a href="/"><img src="/static/images/logo-dark.svg" alt="ObserveX"></a>
</div>
<div class="card">
  <span class="icon">{{ '✅' if 'success' in title|lower or 'verified' in title|lower or 'confirmed' in title|lower else ('⚠️' if 'warn' in title|lower else '❌') }}</span>
  <h1>{{ title }}</h1>
  <p>{{ message }}</p>
  <a href="{{ action_href }}" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    {{ action_label }}
  </a>
  <a href="/" class="back-link">← Back to ObserveX</a>
</div>
</body>
</html>
