<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign in | ObserveX</title><link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"></head><body class="login-body theme-white auth-page-body"><main class="auth-page-shell auth-page-shell-tight single-focus"><section class="login-panel auth-page-form-panel"><a class="site-brand auth-page-brand" href="/"><span class="site-brand-badge">OX</span><span><strong>ObserveX</strong><small>Enterprise observability</small></span></a><div class="eyebrow">Sign in</div><h2 class="auth-form-title">Access your workspace</h2><form class="form-grid" id="loginForm"><label>Email</label><input type="email" name="email" value="admin@vewit.local" required><label>Password</label><input type="password" name="password" value="admin123" required><button class="primary-btn wide" type="submit">Sign in</button></form><div id="loginResult" class="result-box">Use your organization account. If email verification is enabled, verify first.</div><div class="auth-page-links"><a href="/forgot-password">Forgot password?</a><span class="dot-sep">•</span><a href="/create-account">Create workspace</a></div></section></main><script>const f=document.getElementById('loginForm');const box=document.getElementById('loginResult');f.addEventListener('submit',async(e)=>{e.preventDefault();box.textContent='Signing in...';const payload=Object.fromEntries(new FormData(f).entries());try{const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to sign in.');window.location.href='/workspace';}catch(err){box.textContent=err.message;}});</script></body></html>
