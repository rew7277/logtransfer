<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign in – ObserveX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1f2328}
.card{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:32px;width:100%;max-width:380px}
h1{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:#57606a;text-align:center;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#57606a}
input{width:100%;padding:8px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:#1d4ed8}
.err{color:#cf222e;font-size:12px;margin-bottom:12px;display:none}
.footer{text-align:center;margin-top:16px;font-size:12px;color:#57606a}
.footer a{color:#2563eb;text-decoration:none}
</style></head><body>
<div class="card">
  <h1>ObserveX</h1>
  <div class="sub">Sign in to your workspace</div>
  <div class="err" id="errMsg"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@company.com" />
  <label>Password</label>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
  <button class="btn" onclick="doLogin()">Sign in</button>
  <div class="footer"><a href="/create-account">Create a workspace</a> · <a href="/forgot-password">Forgot password?</a></div>
</div>
<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('errMsg');
  err.style.display='none';
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
  const d=await res.json();
  if(!res.ok){err.textContent=d.error||'Login failed';err.style.display='block';return;}
  location.href=d.workspace_url||'/workspace';
}
</script></body></html>
