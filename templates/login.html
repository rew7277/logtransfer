<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ObserveX · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body class="login-page">
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise-layer"></div>

  <main class="login-container">
    <div class="login-card" data-animate="fadeup">
      <header class="login-header">
        <div class="brand-mark" id="loginBrand">OX</div>
        <div class="brand-info">
          <span class="brand-name">ObserveX</span>
          <span class="brand-tier">Enterprise</span>
        </div>
      </header>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-caption">Sign in to your observability workspace</p>

      <div class="demo-row">
        <span class="demo-tag">Demo credentials pre-filled</span>
      </div>

      <div class="fields">
        <div class="field">
          <label class="field-label">Email address</label>
          <input class="field-input" type="email" id="emailInput" value="admin@vewit.local" autocomplete="email" />
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input class="field-input" type="password" id="passwordInput" value="admin123" autocomplete="current-password" />
        </div>
      </div>

      <button class="btn-primary btn-full" id="loginBtn">
        <span class="btn-label">Sign in</span>
        <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="status-pill" id="loginStatus">
        <span class="status-dot"></span>
        Demo credentials ready — click Sign in
      </div>
    </div>
  </main>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const statusEl = document.getElementById('loginStatus');

    function setStatus(msg, type = 'idle') {
      statusEl.textContent = msg;
      statusEl.className = `status-pill ${type}`;
    }

    loginBtn.addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      if (!email || !password) { setStatus('Please enter your email and password.', 'error'); return; }

      loginBtn.disabled = true;
      loginBtn.querySelector('.btn-label').textContent = 'Signing in…';
      setStatus('Authenticating…', 'loading');

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || 'Authentication failed. Please try again.', 'error');
          loginBtn.disabled = false;
          loginBtn.querySelector('.btn-label').textContent = 'Sign in';
          return;
        }
        setStatus('Authenticated! Loading workspace…', 'success');
        setTimeout(() => window.location.href = '/workspace', 700);
      } catch {
        setStatus('Network error — please try again.', 'error');
        loginBtn.disabled = false;
        loginBtn.querySelector('.btn-label').textContent = 'Sign in';
      }
    });

    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
