<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in · ObserveX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{background:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(15,23,42,.08),0 2px 10px rgba(15,23,42,.05);width:100%;max-width:460px;padding:36px 36px 28px}
.logo{display:flex;align-items:center;justify-content:center;margin-bottom:24px}.logo img{height:44px;width:auto;display:block}.logo img{height:42px;width:auto;display:block}

h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px;color:#0d1117}
.subtitle{font-size:13px;color:#656d76;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#424a53;margin-bottom:6px}
input,select{width:100%;padding:11px 13px;background:#f8fafc;border:1px solid #d0d7de;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;color:#0d1117;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:#1f6feb;box-shadow:0 0 0 3px rgba(31,111,235,.12);background:#fff}
input::placeholder{color:#adb5bd}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:38px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#adb5bd;display:flex;align-items:center;padding:2px}
.pw-toggle:hover{color:#656d76}
.forgot-row{text-align:right;margin-top:-10px;margin-bottom:16px}
.forgot-row a{font-size:11px;color:#1f6feb;text-decoration:none;font-weight:600}
.forgot-row a:hover{text-decoration:underline}
.btn,.btn-primary,button[type='submit']{width:100%;padding:12px 16px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}.btn:hover,.btn-primary:hover,button[type='submit']:hover{background:#1d4ed8}
.btn,.btn-primary,button[type='submit']{width:100%;padding:12px 16px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}.btn:hover,.btn-primary:hover,button[type='submit']:hover{background:#1d4ed8}
.btn,.btn-primary,button[type='submit']{width:100%;padding:12px 16px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}.btn:hover,.btn-primary:hover,button[type='submit']:hover{background:#1d4ed8}
.btn,.btn-primary,button[type='submit']{width:100%;padding:12px 16px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}.btn:hover,.btn-primary:hover,button[type='submit']:hover{background:#1d4ed8}
.msg{padding:10px 14px;border-radius:7px;font-size:12px;font-weight:500;margin-bottom:16px;display:none}
.msg.error{background:#fff0f0;border:1px solid #ffcdd2;color:#c62828;display:block}
.msg.success{background:#f0fff4;border:1px solid #c8e6c9;color:#2e7d32;display:block}
.link-row{text-align:center;margin-top:20px;font-size:12px;color:#656d76}
.link-row a{color:#1f6feb;text-decoration:none;font-weight:600}
.link-row a:hover{text-decoration:underline}
.info-box{background:#f6f8fa;border:1px solid #d0d7de;border-radius:7px;padding:12px;font-size:12px;color:#656d76;margin-top:16px;line-height:1.6}
.info-box strong{color:#0d1117}
code{font-family:'IBM Plex Mono',monospace;font-size:11px}
</style>
</head>

<body>
  <div class="card">
    <div class="logo"><img src="/static/images/logo-primary.svg" alt="ObserveX"></div>
    <h1 style="font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;color:#0f172a;line-height:1.15">Welcome back</h1>
    <div class="subtitle" style="font-size:14px;color:#64748b;text-align:center;margin-bottom:24px">Sign in to your ObserveX workspace</div>
    <form method="post"><div class="field"><label for="email">Email</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required/></div><button type="submit">Sign in</button></form>
    <div class="footer" style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">Don&apos;t have a workspace? <a href="/create-account" style="color:#2563eb;text-decoration:none;font-weight:600">Create one free</a></div>
  </div>
</body>

</html>
