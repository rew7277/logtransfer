<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create Workspace – ObserveX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1f2328;padding:20px}
.card{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:32px;width:100%;max-width:420px}
h1{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:#57606a;text-align:center;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#57606a}
input,select{width:100%;padding:8px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none;background:#fff}
input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#1d4ed8}
.err{color:#cf222e;font-size:12px;margin-bottom:12px;display:none}
.footer{text-align:center;margin-top:16px;font-size:12px;color:#57606a}
.footer a{color:#2563eb;text-decoration:none}
</style></head><body>
<div class="card">
  <h1>Create Workspace</h1>
  <div class="sub">Start managing your logs with ObserveX</div>
  <div class="err" id="errMsg"></div>
  <label>Organization name</label><input type="text" id="orgName" placeholder="Acme Corp" />
  <label>Your name</label><input type="text" id="adminName" placeholder="Jane Smith" />
  <label>Email</label><input type="email" id="email" placeholder="you@company.com" />
  <label>Password</label><input type="password" id="pw" placeholder="Min. 8 characters" />
  <label>Theme</label>
  <select id="theme"><option value="dark">Dark</option><option value="white">Light</option></select>
  <button class="btn" onclick="doRegister()">Create workspace</button>
  <div class="footer"><a href="/login">Already have a workspace? Sign in</a></div>
</div>
<script>
async function doRegister(){
  const err=document.getElementById('errMsg');
  err.style.display='none';
  const body={org_name:document.getElementById('orgName').value.trim(),name:document.getElementById('adminName').value.trim(),email:document.getElementById('email').value.trim(),password:document.getElementById('pw').value,role:'admin',theme_mode:document.getElementById('theme').value};
  const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await res.json();
  if(!res.ok){err.textContent=d.error||'Registration failed';err.style.display='block';return;}
  location.href=d.workspace_url||'/workspace';
}
</script></body></html>
