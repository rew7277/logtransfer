<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create account | ObserveX</title><link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"></head>
<body class="login-body theme-white auth-page-body"><main class="auth-page-shell auth-page-shell-tight auth-layout-simple"><section class="login-panel auth-page-form-panel"><a class="site-brand auth-page-brand" href="/"><span class="site-brand-badge">OX</span><span><strong>ObserveX</strong><small>Enterprise observability</small></span></a><div class="eyebrow">Create workspace</div><h2 class="auth-form-title">Start your workspace</h2><p class="muted auth-copy-muted">Create your organization, become the first admin, and invite the rest of the team later.</p><form class="form-grid" id="registerForm"><div class="two-col-form"><div><label>Organization name</label><input type="text" name="organization_name" placeholder="Marq Systems" required></div><div><label>Organization slug</label><input type="text" name="organization_slug" placeholder="marq" required></div></div><div class="two-col-form"><div><label>Your name</label><input type="text" name="name" value="Marq" required></div><div><label>Your email</label><input type="email" name="email" placeholder="admin@yourorg.com" required></div></div><div class="two-col-form"><div><label>Password</label><input type="password" name="password" placeholder="Create password" required></div><div><label>Role</label><select name="role"><option value="admin">Admin</option></select></div></div><input type="hidden" name="theme_mode" value="white"><button class="primary-btn wide" type="submit">Create workspace</button></form><div id="registerResult" class="result-box">New organizations create a workspace here. Existing users should use Sign in.</div><div class="auth-page-links"><a href="/login">Sign in</a><span class="dot-sep">•</span><a href="/">Back to website</a></div></section></main><script>const form=document.getElementById('registerForm');const result=document.getElementById('registerResult');form.addEventListener('submit',async(e)=>{e.preventDefault();result.textContent='Creating workspace...';const payload=Object.fromEntries(new FormData(form).entries());try{const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to create workspace.');result.innerHTML=`Workspace created. <a href="/login">Sign in</a> or verify email here: <a href="${d.verify_url}">Verify email</a>`;}catch(err){result.textContent=err.message;}});</script></body></html>
