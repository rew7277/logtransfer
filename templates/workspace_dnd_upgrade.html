<!-- STEP 1: Replace the "Fast actions" panel content in overviewSection -->
<!-- Find: <label class="upload-box"> ... </label> -->
<!-- Replace with this improved drag-drop zone: -->

<section class="panel">
  <div class="panel-head"><h3>Fast actions</h3></div>

  <!-- ── Improved drag-and-drop upload zone ── -->
  <div class="dnd-upload-zone" id="dndUploadZone" role="button" tabindex="0" aria-label="Drop log files to upload">
    <input type="file" id="logFileInput" hidden multiple accept=".log,.txt,.json,.csv,.ndjson" />
    <div class="dnd-upload-icon">⬆</div>
    <div class="dnd-upload-title">Drag &amp; drop log files here</div>
    <div class="dnd-upload-sub">or <span class="dnd-browse-link" id="dndBrowseLink">click to browse</span></div>
    <div class="dnd-upload-formats">
      <span>.log</span><span>.json</span><span>.ndjson</span><span>.csv</span><span>.txt</span>
    </div>
  </div>

  <div class="dnd-upload-progress" id="dndProgress" style="display:none">
    <div class="dnd-progress-bar-track"><div class="dnd-progress-bar-fill" id="dndProgressFill"></div></div>
    <div class="dnd-progress-label" id="dndProgressLabel">Uploading…</div>
  </div>

  <div id="uploadStatus" class="result-box" style="margin-top:12px">No upload started yet.</div>

  <!-- Quick actions below the drop zone -->
  <div class="dnd-quick-actions" style="margin-top:14px">
    <button class="secondary-btn" data-jump="logsSection">Open explorer</button>
    <button class="secondary-btn" data-jump="usersSection">Manage users</button>
    <button class="secondary-btn" data-jump="orgSection">Brand workspace</button>
  </div>
</section>


<!-- ─────────────────────────────────────────────────────────────────
     STEP 2: Add these CSS rules to styles.css
     ───────────────────────────────────────────────────────────────── -->
<style id="dnd-styles-to-copy">
/* Drag & drop upload zone */
.dnd-upload-zone {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 28px 20px;
  border: 2px dashed var(--border);
  border-radius: 16px;
  background: var(--panel-2);
  cursor: pointer; text-align: center;
  transition: all 0.25s ease; position: relative;
  user-select: none;
}
.dnd-upload-zone:hover, .dnd-upload-zone.drag-active {
  border-color: var(--primary);
  background: color-mix(in srgb, var(--primary) 6%, var(--panel-2));
  box-shadow: 0 0 32px color-mix(in srgb, var(--primary) 12%, transparent);
}
.dnd-upload-zone.drag-active {
  transform: scale(1.01);
}
.dnd-upload-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: color-mix(in srgb, var(--primary) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--primary) 30%, transparent);
  display: grid; place-items: center; font-size: 20px;
  margin-bottom: 4px; transition: transform 0.2s;
}
.dnd-upload-zone.drag-active .dnd-upload-icon { transform: translateY(-4px); }
.dnd-upload-title { font-weight: 600; font-size: 14px; color: var(--text); }
.dnd-upload-sub   { font-size: 13px; color: var(--muted); }
.dnd-browse-link  { color: var(--primary); cursor: pointer; text-decoration: underline; }
.dnd-upload-formats {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-top: 4px;
}
.dnd-upload-formats span {
  padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  background: color-mix(in srgb, var(--panel) 60%, transparent);
  border: 1px solid var(--border); color: var(--muted);
}

/* Progress bar */
.dnd-upload-progress { margin-top: 12px; }
.dnd-progress-bar-track {
  height: 4px; border-radius: 4px;
  background: var(--border); overflow: hidden; margin-bottom: 8px;
}
.dnd-progress-bar-fill {
  height: 100%; border-radius: 4px;
  background: var(--primary); width: 0%;
  transition: width 0.3s ease;
}
.dnd-progress-label { font-size: 12px; color: var(--muted); text-align: center; }

/* Quick actions row */
.dnd-quick-actions {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
@media (max-width: 980px) {
  .dnd-quick-actions { grid-template-columns: 1fr 1fr; }
}
</style>


<!-- ─────────────────────────────────────────────────────────────────
     STEP 3: Add this JS to app.js (replaces the existing upload handler)
     Place after the `state` and `$` declarations.
     ───────────────────────────────────────────────────────────────── -->
<script id="dnd-js-to-copy">
// ── Drag & Drop upload (enhanced) ──

function initDragDropUpload() {
  const zone     = document.getElementById('dndUploadZone');
  const input    = document.getElementById('logFileInput');
  const status   = document.getElementById('uploadStatus');
  const progress = document.getElementById('dndProgress');
  const fill     = document.getElementById('dndProgressFill');
  const label    = document.getElementById('dndProgressLabel');

  if (!zone || !input) return;

  // Click to browse
  zone.addEventListener('click', () => input.click());
  document.getElementById('dndBrowseLink')?.addEventListener('click', e => { e.stopPropagation(); input.click(); });
  zone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') input.click(); });

  // Drag events
  let dragCounter = 0;
  zone.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; zone.classList.add('drag-active'); });
  zone.addEventListener('dragleave', ()  => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; zone.classList.remove('drag-active'); } });
  zone.addEventListener('dragover',  e  => { e.preventDefault(); });
  zone.addEventListener('drop',      e  => {
    e.preventDefault(); dragCounter = 0; zone.classList.remove('drag-active');
    handleFiles(e.dataTransfer.files);
  });

  // Full-page drop (when user drops anywhere on the workspace)
  document.addEventListener('dragenter', e => { e.preventDefault(); });
  document.addEventListener('dragover',  e => { e.preventDefault(); });
  document.addEventListener('drop',      e => {
    // Only if NOT dropped on the zone (zone handles its own drop)
    if (!zone.contains(e.target) && e.target !== zone) {
      e.preventDefault();
      handleFiles(e.dataTransfer.files);
    }
  });

  // File input change
  input.addEventListener('change', e => handleFiles(e.target.files));

  async function handleFiles(files) {
    if (!files || !files.length) return;
    const allowed = ['.log','.txt','.json','.csv','.ndjson'];
    const valid = Array.from(files).filter(f => allowed.some(ext => f.name.toLowerCase().endsWith(ext)));
    if (!valid.length) {
      status.textContent = '✗ No supported files found. Accepted: .log, .json, .ndjson, .csv, .txt';
      status.style.color = 'var(--error, #f87171)';
      return;
    }

    progress.style.display = 'block';
    fill.style.width = '10%';
    label.textContent = `Uploading ${valid.length} file${valid.length > 1 ? 's' : ''}…`;
    status.textContent = 'Upload in progress…';
    status.style.color = '';

    let totalIngested = 0;
    for (let i = 0; i < valid.length; i++) {
      const file = valid[i];
      label.textContent = `Uploading ${file.name} (${i + 1}/${valid.length})…`;
      fill.style.width = `${10 + ((i / valid.length) * 80)}%`;
      try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch('/api/logs/upload', { method: 'POST', body: fd });
        const d = await r.json();
        if (r.ok) {
          totalIngested += d.ingested || 0;
        } else {
          toast(`Upload failed: ${d.error || 'Unknown error'}`, true);
        }
      } catch (err) {
        toast(`Error uploading ${file.name}: ${err.message}`, true);
      }
    }

    fill.style.width = '100%';
    label.textContent = 'Upload complete';
    status.textContent = `✓ Uploaded ${valid.length} file${valid.length > 1 ? 's' : ''}. ${totalIngested.toLocaleString()} log events ingested.`;
    status.style.color = 'var(--success, #34d399)';

    setTimeout(() => {
      progress.style.display = 'none';
      fill.style.width = '0%';
    }, 2000);

    input.value = '';
    // Refresh the dashboard data
    if (typeof loadBootstrap === 'function') loadBootstrap();
  }
}

// Call after DOM is ready — replace old upload handler
document.addEventListener('DOMContentLoaded', initDragDropUpload);
// Also attach toolbar upload button (reuses same input)
// The #logFileInput in the logsSection toolbar also triggers the same handler via input change event.
</script>
