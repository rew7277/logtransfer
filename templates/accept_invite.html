<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Accept invite | ObserveX</title><link rel='stylesheet' href='{{ url_for("static", filename="styles.css") }}'></head><body class='login-body theme-white auth-page-body'><main class='auth-page-shell'><section class='auth-page-copy glass-panel'><div class='eyebrow'>Workspace invite</div><h1>Join {{ invite.org_name }}</h1><p class='hero-lead compact-lead'>You were invited as <strong>{{ invite.role }}</strong> using <strong>{{ invite.email }}</strong>.</p></section><section class='login-panel auth-page-form-panel'><div class='eyebrow'>Accept invite</div><h2 class='auth-form-title'>Create your password</h2><form class='login-form' id='inviteAcceptForm'><div><label>Your name</label><input type='text' name='name' placeholder='Marq' required /></div><div><label>Password</label><input type='password' name='password' placeholder='Create password' required /></div><button class='primary-btn wide' type='submit'>Join workspace</button></form><div class='result-box' id='inviteAcceptResult'>Complete your account and enter the shared workspace.</div></section></main><script>document.getElementById('inviteAcceptForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload=Object.fromEntries(new FormData(e.target).entries());payload.token='{{ invite.token }}';const box=document.getElementById('inviteAcceptResult');box.textContent='Joining workspace...';const r=await fetch('/api/invitations/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();box.textContent=d.message||d.error||'Done';if(r.ok){setTimeout(()=>location.href='/workspace',800);}});</script></body></html>
