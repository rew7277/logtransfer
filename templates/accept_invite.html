<!DOCTYPE html><html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
<meta name="theme-color" content="#2563eb"><meta charset="UTF-8"/><title>Accept Invite – ObserveX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1f2328;padding:20px}.card{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:32px;width:100%;max-width:380px;text-align:center}h1{font-size:20px;font-weight:700;margin-bottom:8px}p{font-size:13px;color:#57606a;margin-bottom:20px}input{width:100%;padding:8px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}input:focus{border-color:#2563eb}label{display:block;text-align:left;font-size:12px;font-weight:600;color:#57606a;margin-bottom:4px}.btn{width:100%;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}.err{color:#cf222e;font-size:12px;margin-bottom:12px;display:none}</style></head>
<body><div class="card">
  <h1>Accept Invite</h1>
  <p>You've been invited to join as <strong>{{ invite.role }}</strong>. Set a password to continue.</p>
  <div class="err" id="e"></div>
  <label>Your name</label><input type="text" id="n" placeholder="Your name"/>
  <label>Password</label><input type="password" id="p" placeholder="Min. 8 characters"/>
  <button class="btn" onclick="accept()">Accept &amp; join</button>
</div>
<script>
async function accept(){
  const e=document.getElementById('e');e.style.display='none';
  const res=await fetch('/api/invitations/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'{{ invite.token }}',name:document.getElementById('n').value,password:document.getElementById('p').value})});
  const d=await res.json();
  if(!res.ok){e.textContent=d.error||'Failed';e.style.display='block';return;}
  location.href=d.workspace_url||'/workspace';
}
</script></body></html>
