<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Forgot Password – ObserveX</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1f2328;padding:20px}.card{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:32px;width:100%;max-width:380px}h1{font-size:18px;font-weight:700;margin-bottom:16px}label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#57606a}input{width:100%;padding:8px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none}.btn{width:100%;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}.msg{font-size:13px;color:#1a7f37;margin-bottom:10px;display:none}.footer{text-align:center;margin-top:14px;font-size:12px}.footer a{color:#2563eb;text-decoration:none}</style></head>
<body><div class="card">
  <h1>Forgot Password</h1>
  <div class="msg" id="m"></div>
  <label>Email</label><input type="email" id="e" placeholder="you@company.com"/>
  <button class="btn" onclick="send()">Send reset link</button>
  <div class="footer"><a href="/login">Back to sign in</a></div>
</div>
<script>
async function send(){
  const m=document.getElementById('m');
  const res=await fetch('/api/password/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('e').value.trim()})});
  m.textContent='If that email exists, a reset link has been sent.';m.style.display='block';
}
</script></body></html>
