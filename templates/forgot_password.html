<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Forgot password | ObserveX</title><link rel='stylesheet' href='{{ url_for("static", filename="styles.css") }}'></head><body class='login-body theme-white auth-page-body'><main class='auth-page-shell'><section class='auth-page-copy glass-panel'><a class='site-brand auth-page-brand' href='/'><span class='site-brand-badge'>OX</span><span><strong>ObserveX</strong><small>Enterprise observability</small></span></a><div class='eyebrow'>Password reset</div><h1>Request a reset link.</h1><p class='hero-lead compact-lead'>For local/demo mode, the reset link is shown on screen. In production, wire this to SMTP.</p></section><section class='login-panel auth-page-form-panel'><div class='eyebrow'>Forgot password</div><h2 class='auth-form-title'>Recover access</h2><form class='login-form' id='forgotForm'><div><label>Email address</label><input type='email' name='email' placeholder='admin@company.com' required /></div><button class='primary-btn wide' type='submit'>Create reset link</button></form><div class='result-box' id='forgotResult'>Enter the email used for your workspace account.</div><div class='auth-page-links'><a href='/login'>Back to sign in</a></div></section></main><script>document.getElementById('forgotForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload=Object.fromEntries(new FormData(e.target).entries());const box=document.getElementById('forgotResult');box.textContent='Creating reset link...';const r=await fetch('/api/password/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();box.innerHTML=d.reset_url?`Reset link: <a href="${d.reset_url}">${d.reset_url}</a>`:(d.message||d.error||'Done');});</script></body></html>
