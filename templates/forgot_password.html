<!DOCTYPE html>
<html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
<meta name="theme-color" content="#0b1220"><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password – ObserveX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#020617;--panel:rgba(8,15,34,.78);--panel-border:rgba(255,255,255,.1);--text:#e5eefc;--muted:#9fb0ca;--input-bg:rgba(255,255,255,.06);--input-border:rgba(148,163,184,.22);--accent:#22d3ee;--accent2:#6366f1;--danger:#fb7185}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(34,211,238,.16), transparent 22%),radial-gradient(circle at top right, rgba(139,92,246,.18), transparent 26%),linear-gradient(180deg,#020617 0%,#0b1120 52%,#020617 100%);display:flex;align-items:center;justify-content:center;padding:18px}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.08;background-image:linear-gradient(rgba(255,255,255,.13) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.13) 1px, transparent 1px);background-size:36px 36px}.card{width:min(100%,460px);padding:28px;border-radius:30px;background:var(--panel);border:1px solid var(--panel-border);backdrop-filter:blur(22px);box-shadow:0 30px 80px rgba(0,0,0,.42)}.logo{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.logo img{height:42px}.badge{padding:8px 12px;border-radius:999px;border:1px solid rgba(34,211,238,.18);background:rgba(34,211,238,.1);font-size:12px;color:#c7f5ff;font-weight:700}h1{margin:0;font:800 34px/1 Syne,Inter,sans-serif;letter-spacing:-1px}p{margin:12px 0 0;color:var(--muted);font-size:14px;line-height:1.7}.form{margin-top:24px;padding:22px;border-radius:26px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}label{display:block;font-size:12px;font-weight:700;color:#d1def3;margin-bottom:8px}input{width:100%;padding:15px 16px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:18px;font:14px Inter,Arial,sans-serif;color:#f8fbff;outline:none;transition:border-color .18s,box-shadow .18s,background .18s}input:focus{border-color:rgba(34,211,238,.5);box-shadow:0 0 0 5px rgba(34,211,238,.11);background:rgba(255,255,255,.08)}.btn{width:100%;padding:15px 18px;margin-top:18px;border:0;border-radius:18px;background:linear-gradient(135deg,#22d3ee 0%,#38bdf8 32%,#6366f1 100%);color:#05111f;font:800 14px Inter,Arial,sans-serif;cursor:pointer;box-shadow:0 16px 34px rgba(34,211,238,.2)}.btn:hover{transform:translateY(-1px)}.msg{display:none;padding:14px 16px;border-radius:16px;font-size:12px;font-weight:700;margin:18px 0 0}.msg.success{display:block;background:rgba(34,197,94,.12);border:1px solid rgba(74,222,128,.22);color:#bbf7d0}.footer{display:flex;justify-content:space-between;gap:12px;margin-top:18px;font-size:12px;color:#8ea3c0}.footer a{color:#7dd3fc;text-decoration:none;font-weight:700}.footer a:hover{text-decoration:underline}@media(max-width:640px){body{padding:14px}.card{padding:20px}h1{font-size:28px}.footer{flex-direction:column}}
</style></head>
<body><div class="card"><div class="logo"><img src="/static/images/logo-primary.svg" alt="ObserveX"><div class="badge">Account recovery</div></div><h1>Forgot password</h1><p>Enter your work email and we’ll send a secure reset link so you can get back into your workspace.</p><div class="msg" id="m"></div><div class="form"><label>Email</label><input type="email" id="e" placeholder="you@company.com" autocomplete="email"/><button class="btn" onclick="send()">Send reset link</button></div><div class="footer"><a href="/login">Back to sign in</a><span>ObserveX Prime</span></div></div>
<script>
async function send(){const m=document.getElementById('m');const res=await fetch('/api/password/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('e').value.trim()})});m.textContent='If that email exists, a reset link has been sent.';m.className='msg success';m.style.display='block';}
</script></body></html>
